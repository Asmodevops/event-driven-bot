[project]
name = "adapters"
version = "0.1.0"
description = "Shared helpers adapters between q_bot services."
requires-python = ">=3.13"
dependencies = [
    "uuid7>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/adapters"]
