[project]
name = "contracts"
version = "0.1.0"
description = "Shared message contracts exchanged over NATS between q_bot services."
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/contracts"]
