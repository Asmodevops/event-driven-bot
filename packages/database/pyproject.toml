[project]
name = "database"
version = "0.1.0"
description = "Shared SQLAlchemy models, engine setup and repositories for q_bot services."
requires-python = ">=3.13"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.44",
    "psycopg[binary]>=3.2.12",
    "alembic>=1.17.2",
    "domain",
]

[tool.uv.sources]
domain = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/database"]
